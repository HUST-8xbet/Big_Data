apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: crypto-system
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: crypto-frontend:v2  # ✅ Sẽ build từ Dockerfile.frontend-k8s
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http

        env:
        - name: BACKEND_HOST
          value: "backend"  # Service name

        # ✅ Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3

        # ✅ Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: crypto-system
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: frontend

---
# ✅ Ingress - expose frontend ra ngoài
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: crypto-system
spec:
  rules:
  - host: "crypto.local"  # Thay bằng domain thật
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
