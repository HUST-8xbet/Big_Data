version: '3.8'

# Định nghĩa mạng chung cho toàn bộ các service giao tiếp với nhau
networks:
  crypto-network:
    driver: bridge

# Định nghĩa Volumes để lưu trữ vĩnh viễn
volumes:
  postgres_data:
  minio_data:
  kafka_data:
  influxdb_data:

services:
  # ==========================================
  # 1. KAFKA (Chế độ KRaft) & REDPANDA CONSOLE
  # ==========================================
  # ==========================================
  # 1. KAFKA (Image Apache Chính chủ - KRaft)
  # ==========================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: crypto_kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tự động tạo Topic Kafka (Chạy xong tự tắt)
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: crypto_kafka_init
    depends_on:
      kafka:
        condition: service_healthy # Chỉ chạy khi Kafka đã sẵn sàng
    command: >
      bash -c "
      echo 'Đang khởi tạo các Topic cho dự án...' &&
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic binance_live_prices --partitions 3 --replication-factor 1 &&
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic user_alerts_topic --partitions 1 --replication-factor 1 &&
      echo 'Tạo Topic thành công!'
      "
    networks:
      - crypto-network

  # Giao diện xem Kafka siêu mượt
  redpanda-console:
    image: redpandadata/console:latest
    container_name: crypto_redpanda_console
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - crypto-network

  # ==========================================
  # 2. MINIO (Data Lake)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: crypto_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tự động tạo sẵn 3 Bucket (Chạy xong tự tắt)
  minio-init:
    image: minio/mc:latest
    container_name: crypto_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Đang khởi tạo các Bucket...' &&
      mc alias set myminio http://minio:9000 admin password123 &&
      mc mb --ignore-existing myminio/raw-data &&
      mc mb --ignore-existing myminio/processed-data &&
      mc mb --ignore-existing myminio/ml-models &&
      echo 'Tạo Bucket thành công!'
      "
    networks:
      - crypto-network

  # ==========================================
  # 3. DATABASE: POSTGRESQL & INFLUXDB
  # ==========================================
  postgres:
    image: postgres:15
    container_name: crypto_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=crypto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crypto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: crypto_influx
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=crypto_org
      - DOCKER_INFLUXDB_INIT_BUCKET=crypto_prices
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=super-secret-token-12345
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 4. APACHE SPARK CLUSTER
  # ==========================================
 # ==========================================
  # 4. APACHE SPARK CLUSTER (Đã trị bệnh ngủ đông)
  # ==========================================
 # ==========================================
  # 4. APACHE SPARK CLUSTER (Chuẩn Senior)
  # ==========================================
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: crypto_spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080" # Trả về cổng 8080 quen thuộc để bạn dễ xem UI
    volumes:
      - ./:/opt/project
    networks:
      - crypto-network
    # Bắt mạch Master xem đã thức chưa
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8080/ | grep 'Spark Master' > /dev/null"]
      interval: 10s
      retries: 5
      start_period: 15s

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: crypto_spark_worker
    depends_on:
      spark-master:
        condition: service_healthy
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./:/opt/project
    networks:
      - crypto-network


  spark-submit:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: crypto_spark_submit
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      /opt/project/spark_scripts/speed_layer.py
    volumes:
      - ./:/opt/project
    environment:
      - PYTHONPATH=/opt/project
    networks:
      - crypto-network